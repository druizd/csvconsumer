
services:

  rabbitmq:
    image: rabbitmq:3-management
    entrypoint: ["/bin/bash", "/certs/init-certs.sh"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-shipper}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5671:5671"    # AMQPS (TLS) — usado por csvshipper-win
      - "5672:5672"    # AMQP sin TLS — solo para consumer interno (localhost)
      - "15672:15672"  # Management UI — http://<IP>:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./certs:/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  consumer:
    build: .
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-8080}
    network_mode: "host"
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
